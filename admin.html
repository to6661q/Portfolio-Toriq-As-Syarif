<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
    <div class="container" style="padding-top:40px;">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h1 style="color:var(--primary);">Dashboard Admin</h1>
            <a href="index.html" style="text-decoration:none; color:var(--dark);">← View Site</a>
        </div>

        <div class="admin-card">
            <h3>Update Profile</h3>
            <form id="profile-form">
                <input type="text" id="headline" placeholder="Headline" required>
                <textarea id="about_text" placeholder="About Me" rows="4" required></textarea>
                <button type="submit" class="btn-primary">Update Profile</button>
            </form>
        </div>

        <div class="admin-card">
            <h3>Projects</h3>
            <form id="project-form">
                <input type="text" id="p-title" placeholder="Project Title" required>
                <textarea id="p-desc" placeholder="Description"></textarea>
                <input type="url" id="p-link" placeholder="Github Link">
                <button type="submit" class="btn-primary">Add Project</button>
            </form>
            <div id="list-project" style="margin-top:20px;"></div>
        </div>

        <div class="admin-card">
            <h3>Work Experience</h3>
            <form id="work-form">
                <input type="text" id="e-title" placeholder="Position" required>
                <input type="text" id="e-company" placeholder="Company">
                <input type="text" id="e-duration" placeholder="Duration">
                <textarea id="e-desc" placeholder="Description"></textarea>
                <button type="submit" class="btn-primary">Add Work</button>
            </form>
            <div id="list-work" style="margin-top:20px;"></div>
        </div>

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
            <div class="admin-card">
                <h3>Certifications</h3>
                <form id="cert-form">
                    <input type="text" id="c-name" placeholder="Cert Name" required>
                    <input type="text" id="c-pub" placeholder="Publisher">
                    <button type="submit" class="btn-primary">Add Cert</button>
                </form>
                <div id="list-cert" style="margin-top:20px;"></div>
            </div>
            <div class="admin-card">
                <h3>Volunteer</h3>
                <form id="volunteer-form">
                    <input type="text" id="v-role" placeholder="Role" required>
                    <input type="text" id="v-org" placeholder="Organization">
                    <input type="text" id="v-dur" placeholder="Duration">
                    <button type="submit" class="btn-primary">Add Volunteer</button>
                </form>
                <div id="list-volunteer" style="margin-top:20px;"></div>
            </div>
        </div>
    </div>
    <script type="module" src="js/admin-editor.js"></script>
</body>
</html>
