<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Toriq As Syarif</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>

    <!-- Sidebar Statis di Kiri -->
    <aside class="sidebar">
        <div class="sidebar-brand">
            <h2>TAS<span>.</span></h2>
        </div>
        <nav class="sidebar-nav">
            <ul>
                <li><a href="#profil" class="active"><i class="fas fa-user-edit"></i> <span>Profil</span></a></li>
                <li><a href="#projek"><i class="fas fa-project-diagram"></i> <span>Projek</span></a></li>
                <li><a href="#sertifikat"><i class="fas fa-award"></i> <span>Sertifikat</span></a></li>
                <li><a href="index.html" target="_blank"><i class="fas fa-globe"></i> <span>Lihat Web</span></a></li>
            </ul>
        </nav>
        <div class="sidebar-user">
            <div class="user-info">
                <i class="fas fa-user-shield"></i>
                <span>Toriq As Syarif</span>
            </div>
            <button id="logout-btn" class="btn-logout">
                <i class="fas fa-sign-out-alt"></i> Keluar
            </button>
        </div>
    </aside>

    <!-- Konten Utama di Kanan -->
    <main class="main-content">
        <header class="content-header">
            <h1>Dashboard Management</h1>
            <p>Kelola data portofolio Anda secara real-time.</p>
        </header>

        <div class="admin-grid">
            <!-- Form Profil -->
            <section id="profil" class="card">
                <div class="card-title">
                    <i class="fas fa-id-card"></i> Update Profil Utama
                </div>
                <form id="profile-form">
                    <div class="form-group">
                        <label>Nama Lengkap</label>
                        <input type="text" id="full_name" required>
                    </div>
                    <div class="form-group">
                        <label>Headline</label>
                        <input type="text" id="headline">
                    </div>
                    <div class="form-group">
                        <label>Tentang Saya</label>
                        <textarea id="about_text" rows="4"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Foto Profil Baru</label>
                        <input type="file" id="profile_img" accept="image/*">
                    </div>
                    <button type="submit" id="save-profile" class="btn-primary">Update Profil</button>
                </form>
            </section>

            <!-- Form Projek -->
            <section id="projek" class="card">
                <div class="card-title">
                    <i class="fas fa-folder-plus"></i> Tambah Projek Baru
                </div>
                <form id="project-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Judul Projek</label>
                            <input type="text" id="p-title" required>
                        </div>
                        <div class="form-group">
                            <label>Tech Stack</label>
                            <input type="text" id="p-tech" placeholder="Contoh: PHP, Laravel, Docker">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Deskripsi Projek</label>
                        <textarea id="p-desc" rows="3"></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Link GitHub</label>
                            <input type="url" id="p-link">
                        </div>
                        <div class="form-group">
                            <label>Gambar Projek</label>
                            <input type="file" id="p-img" accept="image/*">
                        </div>
                    </div>
                    <button type="submit" class="btn-primary">Tambah Projek</button>
                </form>
            </section>
        </div>

        <footer class="footer-admin">
            &copy; 2026 TAS Dashboard System. Terhubung ke Supabase.
        </footer>
    </main>

    <script type="module" src="js/admin-editor.js"></script>
</body>
</html>
