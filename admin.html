<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | TAS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body class="admin-body">
    <aside class="sidebar">
        <nav class="sidebar-nav">
            <ul class="nav-list">
                <li><a href="#profile"><i class="fas fa-user"></i> <span>Profile</span></a></li>
                <li><a href="#project"><i class="fas fa-code"></i> <span>Projects</span></a></li>
                <li><a href="#work"><i class="fas fa-briefcase"></i> <span>Work</span></a></li>
                <li><a href="#certification"><i class="fas fa-award"></i> <span>Certs</span></a></li>
                <li><a href="#volunteer"><i class="fas fa-heart"></i> <span>Volunteer</span></a></li>
            </ul>
        </nav>
        <button id="logout-btn" class="btn-logout">Logout</button>
    </aside>

   <main class="main-content">
    <section id="project" class="card">
        <div class="card-title">Add Project</div>
        <form id="project-form">
            <input type="text" id="p-title" placeholder="Judul Projek" required>
            <input type="text" id="p-tech" placeholder="Tech Stack (contoh: Python, Laravel)">
            <textarea id="p-desc" placeholder="Deskripsi"></textarea>
            <input type="url" id="p-link" placeholder="Link GitHub">
            <input type="file" id="p-img">
            <button type="submit">Add Project</button>
        </form>
        <div id="list-project"></div>
    </section>

    <section id="work" class="card">
        <div class="card-title">Add Work Experience</div>
        <form id="work-form">
            <input type="text" id="e-title" placeholder="Posisi Pekerjaan" required>
            <input type="text" id="e-company" placeholder="Nama Perusahaan">
            <input type="text" id="e-duration" placeholder="Durasi (Jan 2024 - Sekarang)">
            <textarea id="e-desc" placeholder="Deskripsi Tugas"></textarea>
            <input type="file" id="e-img">
            <button type="submit">Add Work</button>
        </form>
        <div id="list-work"></div>
    </section>
    
    </main>
    <script type="module" src="js/admin-editor.js"></script>
</body>
</html>
