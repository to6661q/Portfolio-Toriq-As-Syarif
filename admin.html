<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Toriq As Syarif</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body class="admin-body">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-brand">
            <h2>TAS<span>.</span></h2>
        </div>
        <nav class="sidebar-nav">
            <ul class="nav-list">
                <li><a href="#profil"><i class="fas fa-user-edit"></i> <span>Profil</span></a></li>
                <li><a href="#projek"><i class="fas fa-project-diagram"></i> <span>My Project</span></a></li>
                <li><a href="#pengalaman"><i class="fas fa-briefcase"></i> <span>Work Experience</span></a></li>
                <li><a href="#sertifikat"><i class="fas fa-award"></i> <span>Certifications</span></a></li>
                <li><a href="index.html" target="_blank"><i class="fas fa-external-link-alt"></i> <span>Lihat Web</span></a></li>
            </ul>
        </nav>
        <div class="sidebar-footer">
            <button id="logout-btn" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Keluar</button>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">
        <header class="content-header">
            <h1>Portfolio Management</h1>
            <p>Dashboard kontrol untuk IT Specialist & Software Developer.</p>
        </header>

        <section id="profil" class="card">
            <div class="card-title"><i class="fas fa-id-card"></i> Personal Summary</div>
            <form id="profile-form">
                <div class="form-group">
                    <label>Headline</label>
                    <input type="text" id="headline" placeholder="Software Developer | IT Specialist">
                </div>
                <div class="form-group">
                    <label>Tentang Saya</label>
                    <textarea id="about_text" rows="4"></textarea>
                </div>
                <button type="submit" class="btn-primary">Update Profil</button>
            </form>
        </section>

        <section id="projek" class="card">
            <div class="card-title"><i class="fas fa-folder-plus"></i> My Project Management</div>
            <form id="project-form">
                <div class="form-row">
                    <div class="form-group"><label>Judul Projek</label><input type="text" id="p-title" required></div>
                    <div class="form-group"><label>Tech Stack (koma)</label><input type="text" id="p-tech" placeholder="Python, Laravel"></div>
                </div>
                <div class="form-group"><label>Link GitHub</label><input type="url" id="p-link"></div>
                <div class="form-group"><label>Gambar Projek</label><input type="file" id="p-img" accept="image/*"></div>
                <button type="submit" class="btn-primary">Tambah Projek</button>
            </form>
            <div class="list-container" id="list-projek"></div>
        </section>

        <section id="pengalaman" class="card">
            <div class="card-title"><i class="fas fa-briefcase"></i> Work Experience Management</div>
            <form id="exp-form">
                <div class="form-row">
                    <div class="form-group"><label>Posisi</label><input type="text" id="e-title" required></div>
                    <div class="form-group"><label>Instansi</label><input type="text" id="e-company"></div>
                </div>
                <div class="form-group"><label>Durasi (e.g. 2025 - Present)</label><input type="text" id="e-duration"></div>
                <div class="form-group"><label>Deskripsi Kerja</label><textarea id="e-desc" rows="3"></textarea></div>
                <button type="submit" class="btn-primary">Tambah Pengalaman</button>
            </form>
            <div class="list-container" id="list-pengalaman"></div>
        </section>

        <section id="sertifikat" class="card">
            <div class="card-title"><i class="fas fa-certificate"></i> Certifications Management</div>
            <form id="cert-form">
                <div class="form-group"><label>Nama Sertifikat</label><input type="text" id="c-title" required></div>
                <div class="form-group"><label>Penerbit</label><input type="text" id="c-issuer"></div>
                <div class="form-group"><label>Scan Sertifikat</label><input type="file" id="c-img" accept="image/*"></div>
                <button type="submit" class="btn-primary">Simpan Sertifikat</button>
            </form>
            <div class="list-container" id="list-sertifikat"></div>
        </section>
    </main>

    <script type="module" src="js/admin-editor.js"></script>
</body>
</html>
