<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Toriq As Syarif</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body class="admin-body">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-content">
            <h2 class="brand">TAS<span>.</span></h2>
            <nav class="nav-menu">
                <a href="#profil" class="nav-item active"><i class="fas fa-user"></i> Profil</a>
                <a href="#projek" class="nav-item"><i class="fas fa-code"></i> Projek</a>
                <a href="#sertifikat" class="nav-item"><i class="fas fa-award"></i> Sertifikat</a>
                <a href="index.html" class="nav-item" target="_blank"><i class="fas fa-external-link-alt"></i> Web Utama</a>
            </nav>
            <div class="sidebar-user">
                <p><i class="fas fa-user-circle"></i> Toriq As Syarif</p>
                <button id="logout-btn" class="logout-link">
                    <i class="fas fa-sign-out-alt"></i> Keluar
                </button>
            </div>
        </div>
    </aside>

    <!-- KONTEN UTAMA -->
    <main class="main-panel">
        <div class="panel-header">
            <h1>Dashboard Management</h1>
            <p>Kelola data profil, projek, dan sertifikasi Anda.</p>
        </div>

        <div class="content-wrapper">
            <!-- Form Profil -->
            <section id="profil" class="admin-card">
                <div class="card-title">Update Profil</div>
                <form id="profile-form">
                    <div class="field">
                        <label>Nama Lengkap</label>
                        <input type="text" id="full_name" value="Toriq As Syarif" required>
                    </div>
                    <div class="field">
                        <label>Headline</label>
                        <input type="text" id="headline" placeholder="Software Developer & IT Specialist">
                    </div>
                    <div class="field">
                        <label>Tentang Saya</label>
                        <textarea id="about_text" rows="4"></textarea>
                    </div>
                    <div class="field">
                        <label>Foto Profil</label>
                        <input type="file" id="profile_img" accept="image/*">
                    </div>
                    <button type="submit" id="save-profile" class="btn-primary">Update Profil</button>
                </form>
            </section>
        </div>
    </main>

    <script type="module" src="js/admin-editor.js"></script>
</body>
</html>
