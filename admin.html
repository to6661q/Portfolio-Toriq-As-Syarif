<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | TAS Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* CSS Khusus Admin untuk Layout Sidebar */
        body { display: flex; background: #f4f9f8; min-height: 100vh; }
        .admin-sidebar { 
            width: 260px; background: #006661; color: white; 
            position: fixed; height: 100%; padding: 20px 0; 
            overflow-y: auto;
        }
        .admin-sidebar h2 { text-align: center; font-size: 1.5rem; margin-bottom: 30px; }
        .admin-nav a { 
            display: block; color: rgba(255,255,255,0.8); padding: 12px 25px; 
            text-decoration: none; font-weight: 600; font-size: 0.9rem;
            transition: 0.3s;
        }
        .admin-nav a:hover { background: rgba(255,255,255,0.1); color: white; }
        
        .admin-main { margin-left: 260px; flex: 1; padding: 40px; }
        .admin-card { 
            background: white; border-radius: 15px; padding: 30px; 
            margin-bottom: 40px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); 
        }
        .admin-card h3 { color: #006661; border-bottom: 2px solid #f4f9f8; padding-bottom: 10px; margin-bottom: 20px; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 5px; font-size: 0.85rem; }
        input, textarea, select { 
            width: 100%; padding: 10px; border: 1px solid #ddd; 
            border-radius: 8px; font-family: inherit; 
        }
        .btn-save { background: #006661; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: 600; width: 100%; }
        
        .record-list { margin-top: 25px; border-top: 1px solid #eee; padding-top: 20px; }
        .manage-item { 
            display: flex; justify-content: space-between; align-items: center; 
            background: #f9fdfc; padding: 10px 15px; border-radius: 8px; margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <aside class="admin-sidebar">
        <h2>TAS. Admin</h2>
        <nav class="admin-nav">
            <a href="#section-profile"><i class="fas fa-user"></i> Profile</a>
            <a href="#section-biodata"><i class="fas fa-id-card"></i> Biodata</a>
            <a href="#section-experience"><i class="fas fa-briefcase"></i> Experience</a>
            <a href="#section-cert"><i class="fas fa-award"></i> Certifications</a>
            <a href="#section-volunteer"><i class="fas fa-hand-holding-heart"></i> Volunteer</a>
            <a href="#section-project"><i class="fas fa-code"></i> Projects</a>
            <a href="#section-contact"><i class="fas fa-envelope"></i> Contact</a>
            <a href="#section-footer"><i class="fas fa-shoe-prints"></i> Footer</a>
            <a href="index.html" style="margin-top: 50px; color: #ffcc00;"><i class="fas fa-external-link-alt"></i> Lihat Website</a>
        </nav>
    </aside>

    <main class="admin-main">

        <section id="section-profile" class="admin-card">
            <h3>Section 2: Profile Settings</h3>
            <form id="profile-form">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="full_name" placeholder="Nama Lengkap">
                </div>
                <div class="form-group">
                    <label>Headline</label>
                    <input type="text" id="headline" placeholder="Contoh: IT Specialist">
                </div>
                <div class="form-group">
                    <label>Profile Photo</label>
                    <input type="file" id="p-photo" accept="image/*">
                </div>
                <button type="submit" class="btn-save">Update Profile</button>
            </form>
        </section>

        <section id="section-biodata" class="admin-card">
            <h3>Section 3: Biodata</h3>
            
            <div class="sub-form">
                <label><strong>Bio Description</strong></label>
                <textarea id="bio-desc" rows="4" placeholder="Ceritakan tentang diri Anda..."></textarea>
                <button onclick="updateBioDesc()" class="btn-save" style="margin-top: 10px; width: auto;">Save Description</button>
            </div>

            <div class="record-list">
                <label><strong>Education Records</strong></label>
                <form id="education-form">
                    <input type="text" id="edu-school" placeholder="Sekolah/Universitas">
                    <input type="text" id="edu-degree" placeholder="Gelar/Jurusan">
                    <input type="text" id="edu-year" placeholder="Tahun">
                    <button type="submit" class="btn-save" style="margin-top:5px;">Add Education</button>
                </form>
                <div id="list-education"></div>
            </div>

            <div class="record-list">
                <label><strong>Technical Skills (Icon)</strong></label>
                <form id="skill-form">
                    <input type="text" id="skill-name" placeholder="Nama Skill">
                    <input type="text" id="skill-icon" placeholder="FontAwesome Class (ex: fab fa-python)">
                    <button type="submit" class="btn-primary" style="margin-top:5px; width:100%;">Add Skill</button>
                </form>
                <div id="list-skill"></div>
            </div>

            <div class="record-list">
                <label><strong>Achievements</strong></label>
                <form id="achievement-form">
                    <input type="text" id="ach-title" placeholder="Nama Penghargaan">
                    <input type="text" id="ach-pub" placeholder="Penerbit">
                    <input type="text" id="ach-date" placeholder="Tanggal/Tahun">
                    <textarea id="ach-desc" placeholder="Deskripsi Singkat"></textarea>
                    <button type="submit" class="btn-save" style="margin-top:5px;">Add Achievement</button>
                </form>
                <div id="list-achievement"></div>
            </div>
        </section>

        <section id="section-experience" class="admin-card">
            <h3>Section 4: Experience</h3>
            <form id="work-form">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <input type="text" id="e-start" placeholder="Start Date">
                    <input type="text" id="e-end" placeholder="End Date">
                </div>
                <input type="text" id="e-title" placeholder="Position">
                <input type="text" id="e-company" placeholder="Company">
                <textarea id="e-desc" placeholder="Description"></textarea>
                <label>Experience Image</label>
                <input type="file" id="e-img">
                <button type="submit" class="btn-save" style="margin-top:10px;">Save Experience</button>
            </form>
            <div id="list-work"></div>
        </section>

        <section id="section-cert" class="admin-card">
            <h3>Section 5: Certifications</h3>
            <form id="certification-form">
                <input type="text" id="c-date" placeholder="Date">
                <input type="text" id="c-title" placeholder="Title">
                <input type="text" id="c-issuer" placeholder="Publisher">
                <textarea id="c-desc" placeholder="Description"></textarea>
                <input type="file" id="c-img">
                <button type="submit" class="btn-save" style="margin-top:10px;">Save Certification</button>
            </form>
            <div id="list-certification"></div>
        </section>

        <section id="section-volunteer" class="admin-card">
            <h3>Section 6: Volunteer</h3>
            <form id="volunteer-form">
                <input type="text" id="v-date" placeholder="Date">
                <input type="text" id="v-title" placeholder="Title">
                <input type="text" id="v-org" placeholder="Organization">
                <textarea id="v-desc" placeholder="Description"></textarea>
                <input type="file" id="v-img">
                <button type="submit" class="btn-save" style="margin-top:10px;">Save Volunteer</button>
            </form>
            <div id="list-volunteer"></div>
        </section>

        <section id="section-project" class="admin-card">
            <h3>Section 7: Projects</h3>
            <form id="project-form">
                <input type="text" id="p-title" placeholder="Project Title">
                <textarea id="p-desc" placeholder="Description"></textarea>
                <input type="text" id="p-tech" placeholder="Tech Stack (comma separated)">
                <input type="url" id="p-link" placeholder="GitHub Link">
                <button type="submit" class="btn-save" style="margin-top:10px;">Save Project</button>
            </form>
            <div id="list-project"></div>
        </section>

        <section id="section-contact" class="admin-card">
            <h3>Section 8: Contact & Maps</h3>
            <form id="contact-form">
                <input type="text" id="co-platform" placeholder="Platform (ex: Instagram)">
                <input type="text" id="co-icon" placeholder="Icon Class (ex: fab fa-instagram)">
                <input type="url" id="co-url" placeholder="URL Link">
                <button type="submit" class="btn-save" style="margin-top:10px;">Add Social Media</button>
            </form>
            <div id="list-contact"></div>
        </section>

        <section id="section-footer" class="admin-card">
            <h3>Section 9: Footer Settings</h3>
            <div class="form-group">
                <label>Email Display</label>
                <input type="email" id="f-email" value="toriqnain@gmail.com">
            </div>
            <div class="form-group">
                <label>Quotes (Enter multiple quotes, one per line)</label>
                <textarea id="f-quotes" rows="6" placeholder="Quote 1...&#10;Quote 2..."></textarea>
            </div>
            <button onclick="saveFooterSettings()" class="btn-save">Update Footer</button>
        </section>

    </main>

    <script type="module" src="js/admin-editor.js"></script>
</body>
</html>
