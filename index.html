<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toriq As Syarif | IT Specialist</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="container nav-flex">
            <a href="#" class="logo">TORIQ<span>.</span></a>
            <nav class="nav-links">
                <a href="#project">Projects</a>
                <a href="#work">Experience</a>
                <a href="#cert">Certs</a>
                <a href="#volunteer">Volunteer</a>
            </nav>
        </div>
    </header>

    <section id="profile" class="hero">
        <div class="container">
            <h1 id="display-headline">...</h1>
            <p id="display-about">...</p>
        </div>
    </section>

    <section id="project" class="section bg-alt">
        <div class="container">
            <h2 class="section-title">Selected Projects</h2>
            <div id="project-list" class="grid"></div>
        </div>
    </section>

    <section id="work" class="section">
        <div class="container">
            <h2 class="section-title">Work Experience</h2>
            <div id="work-list" style="max-width: 800px; margin: 0 auto;"></div>
        </div>
    </section>

    <section id="cert" class="section bg-alt">
        <div class="container">
            <h2 class="section-title">Certifications</h2>
            <div id="cert-list" class="grid"></div>
        </div>
    </section>

    <section id="volunteer" class="section">
        <div class="container">
            <h2 class="section-title">Volunteer Activities</h2>
            <div id="volunteer-list" style="max-width: 800px; margin: 0 auto;"></div>
        </div>
    </section>

    <footer>
        <div class="container">
            <div class="footer-content">
                <h2>Let's Connect</h2>
                <p>Toriq As Syarif - IT Specialist & Developer</p>
                <div class="footer-links">
                    <a href="#project">Projects</a>
                    <a href="#work">Experience</a>
                    <a href="admin.html">Admin Login</a>
                </div>
            </div>
            <div class="copyright">
                &copy; 2026 Toriq As Syarif. All Rights Reserved.
            </div>
        </div>
    </footer>

    <script type="module">
        import { supabase } from './js/supabase-config.js';

        async function init() {
            // Load Profile
            const { data: p } = await supabase.from('profile').select('*').eq('id', 1).single();
            if (p) {
                document.getElementById('display-headline').innerText = p.headline;
                document.getElementById('display-about').innerText = p.about_text;
            }

            const fetchToElement = async (table, elId, templateFn) => {
                const { data } = await supabase.from(table).select('*').order('id', { ascending: false });
                if (data) document.getElementById(elId).innerHTML = data.map(templateFn).join('');
            };

            // Projects (Card style)
            fetchToElement('project', 'project-list', d => `
                <div class="card">
                    <h3>${d.title}</h3>
                    <p>${d.description}</p>
                    <a href="${d.link_github}" target="_blank" style="color:var(--primary); font-weight:700; text-decoration:none;">View GitHub &rarr;</a>
                </div>
            `);

            // Work (Timeline style)
            fetchToElement('work', 'work-list', d => `
                <div class="timeline-item">
                    <h4>${d.job_position}</h4>
                    <div class="meta">${d.company}</div>
                    <span class="duration">${d.duration}</span>
                    <p style="margin:0; font-size:0.95rem; color:var(--text-muted);">${d.description}</p>
                </div>
            `);

            // Cert (Small card style)
            fetchToElement('cert', 'cert-list', d => `
                <div class="card" style="padding:25px; text-align:center;">
                    <h4 style="margin:0 0 10px 0; color:var(--primary);">${d.name}</h4>
                    <div class="meta" style="font-size:0.85rem; opacity:0.7;">${d.publisher}</div>
                </div>
            `);

            // Volunteer (Timeline style)
            fetchToElement('volunteer', 'volunteer-list', d => `
                <div class="timeline-item">
                    <h4>${d.role}</h4>
                    <div class="meta">${d.organization}</div>
                    <span class="duration">${d.duration}</span>
                    <p style="margin:0; font-size:0.95rem; color:var(--text-muted);">${d.description}</p>
                </div>
            `);
        }
        window.onload = init;
    </script>
</body>
</html>
