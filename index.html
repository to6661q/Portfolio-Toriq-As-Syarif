<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toriq As Syarif | IT Specialist</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <header>
    <div class="container nav-flex">
        <a href="#" class="logo">TAS<span>.</span></a>
        <nav class="nav-links">
            <a href="#biodata">Bio</a>
            <a href="#experience">Experience</a>
            <a href="#project">Project</a>
            <a href="#contact">Contact</a>
            <a href="login.html" title="Admin Login"><i class="fas fa-lock" style="color: var(--primary);"></i></a>
        </div>
    </nav>
</header>
    <section id="profile" class="hero">
    <div class="container">
        <img id="display-photo" src="" class="profile-img">
        <h1 id="display-name" style="margin: 0; font-size: 3rem;"></h1>
        <p id="display-headline" style="font-size: 1.5rem; color: var(--primary); font-weight: 700;"></p>
    </div>
</section>

<section id="biodata" class="section">
    <div class="container">
        <h2 class="section-title">Biodata</h2>
        <div style="margin-bottom: 50px;">
            <h3><i class="fas fa-info-circle"></i> Description</h3>
            <p id="display-desc"></p>
        </div>
        <div class="grid">
            <div>
                <h3><i class="fas fa-graduation-cap"></i> Education</h3>
                <div id="edu-list"></div>
            </div>
            <div>
                <h3><i class="fas fa-trophy"></i> Achievement</h3>
                <div id="ach-list"></div>
            </div>
        </div>
        <div style="margin-top: 50px;">
            <h3 style="text-align: center;">Skills</h3>
            <div id="skill-list" class="skills-flex"></div>
        </div>
    </div>
</section>

<section id="experience" class="section bg-light">
    <div class="container"><h2 class="section-title">Work Experience</h2><div id="exp-list" class="grid"></div></div>
</section>
<section id="cert" class="section">
    <div class="container"><h2 class="section-title">Certifications</h2><div id="cert-list" class="grid"></div></div>
</section>
<section id="volunteer" class="section bg-light">
    <div class="container"><h2 class="section-title">Volunteer</h2><div id="vol-list" class="grid"></div></div>
</section>

<section id="project" class="section">
    <div class="container"><h2 class="section-title">Projects</h2><div id="project-list" class="grid"></div></div>
</section>

<section id="contact" class="section">
    <div class="container">
        <h2 class="section-title">Contact Me</h2>
        <div id="contact-list" class="skills-flex" style="margin-bottom: 40px;"></div>
        <div id="map" style="width: 100%; height: 400px; border-radius: 15px; overflow: hidden;">
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d126914.34185244585!2d106.70321287114674!3d-6.25396590390176!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x2e69f156291e0a7b%3A0xc39105470691763!2sSouth%20Tangerang%20City%2C%20Banten!5e0!3m2!1sen!2sid!4v1715320000000!5m2!1sen!2sid" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
        </div>
    </div>
</section>

<footer id="main-footer">
    <div class="container">
        <div style="font-weight: 800; font-size: 1.5rem; margin-bottom: 10px;">TAS.</div>
        <p>@2026 Toriq As Syarif - toriqnain@gmail.com</p>
        <p id="footer-quote" class="footer-quote"></p>
    </div>
</footer>

<script type="module">
    import { supabase } from './js/supabase-config.js';

    const quotes = [
        "Code is like humor. When you have to explain it, it’s bad.",
        "First, solve the problem. Then, write the code.",
        "Clean code always looks like it was written by someone who cares.",
        "The best way to predict the future is to invent it.",
        "Innovation distinguishes between a leader and a follower.",
        "Your most unhappy customers are your greatest source of learning.",
        "The only way to do great work is to love what you do.",
        "Make it work, make it right, make it fast.",
        "Technology is best when it brings people together.",
        "Simplicity is the soul of efficiency."
    ];

    async function init() {
        // 1. Random Quote
        document.getElementById('footer-quote').innerText = `"${quotes[Math.floor(Math.random() * quotes.length)]}"`;

        // 2. Profile
        const { data: prof } = await supabase.from('profile').select('*').eq('id', 1).single();
        if (prof) {
            document.getElementById('display-name').innerText = prof.full_name;
            document.getElementById('display-headline').innerText = prof.headline;
            document.getElementById('display-desc').innerText = prof.description;
            document.getElementById('display-photo').src = prof.photo_url;
        }

        const load = async (table, elId, fn) => {
            const { data } = await supabase.from(table).select('*').order('id', { ascending: false });
            if (data) document.getElementById(elId).innerHTML = data.map(fn).join('');
        };

        // Render sections with specific layouts
        load('experience', 'exp-list', d => `
            <div class="card">
                ${d.image_url ? `<img src="${d.image_url}" class="card-img">` : ''}
                <div class="card-body">
                    <span style="color: var(--primary); font-weight: bold;">${d.start_date} - ${d.end_date}</span>
                    <h4>${d.position} at ${d.company}</h4>
                    <p>${d.description}</p>
                </div>
            </div>`);

        load('skill', 'skill-list', d => `
            <div class="skill-item"><i class="${d.icon_class}"></i><span>${d.name}</span></div>`);

        load('education', 'edu-list', d => `
            <div style="margin-bottom:15px;"><b>${d.school}</b><br>${d.degree} (${d.year})</div>`);

        // Lakukan hal yang sama untuk cert, volunteer, project, dan contact...
    }
    window.onload = init;
</script>
    </body>
</html>
