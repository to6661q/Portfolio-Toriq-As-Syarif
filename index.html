<section class="hero">
    <h1 id="display-name">Loading...</h1>
    <p id="display-subtitle">Sabar ya...</p>
    <img id="display-profile-pic" src="" alt="Profile">
</section>

<script type="module">
    import { supabase } from './js/supabase-config.js';

    async function loadProfile() {
        const { data, error } = await supabase.from('profiles').select('*').single();
        if (data) {
            document.getElementById('display-name').innerText = data.full_name;
            document.getElementById('display-subtitle').innerText = data.hero_subtitle;
            document.getElementById('display-profile-pic').src = data.profile_pic_url;
        }
    }
    loadProfile();
</script>
