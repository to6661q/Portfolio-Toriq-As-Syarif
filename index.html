<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toriq As Syarif | Portfolio</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="container nav-flex">
            <a href="#" class="logo">TAS<span>.</span></a>
            <nav class="nav-links">
                <a href="#project">Projects</a>
                <a href="#work">Work</a>
                <a href="#cert">Certs</a>
                <a href="#volunteer">Volunteer</a>
            </nav>
        </div>
    </header>

    <section id="profile" class="hero">
        <div class="container">
            <h1 id="display-headline">...</h1>
            <p id="display-about">...</p>
        </div>
    </section>

    <section id="project" class="section bg-light">
        <div class="container">
            <h2 class="section-title">Featured Projects</h2>
            <div id="project-list" class="grid"></div>
        </div>
    </section>

    <section class="section">
        <div class="container">
            <h2 class="section-title">Experience & Activities</h2>
            <div class="exp-grid">
                <div>
                    <h3 style="margin-bottom: 30px;"><i class="fas fa-briefcase"></i> Work History</h3>
                    <div id="work-list"></div>
                </div>
                <div>
                    <h3 style="margin-bottom: 30px;"><i class="fas fa-award"></i> Achievement & Contributions</h3>
                    <div id="cert-list"></div>
                    <div id="volunteer-list" style="margin-top: 50px;"></div>
                </div>
            </div>
        </div>
    </section>

    <footer style="padding: 50px 0; text-align: center; border-top: 1px solid #eee; color: #999; font-size: 0.9rem;">
        &copy; 2026 Toriq As Syarif. Built with Supabase.
    </footer>

    <script type="module">
        import { supabase } from './js/supabase-config.js';

        async function init() {
            // Load Profile
            const { data: p } = await supabase.from('profile').select('*').eq('id', 1).single();
            if (p) {
                document.getElementById('display-headline').innerText = p.headline;
                document.getElementById('display-about').innerText = p.about_text;
            }

            // Fungsi Load Data universal agar rapi
            const fetchData = async (table, elId, templateFn) => {
                const { data } = await supabase.from(table).select('*').order('id', { ascending: false });
                if (data) document.getElementById(elId).innerHTML = data.map(templateFn).join('');
            };

            // Template Project Card
            fetchData('project', 'project-list', d => `
                <div class="card">
                    <h3>${d.title}</h3>
                    <p>${d.description || 'No description available.'}</p>
                    <a href="${d.link_github || '#'}" target="_blank" class="github-link">
                        View Project Repository &rarr;
                    </a>
                </div>
            `);

            // Template Work Item
            fetchData('work', 'work-list', d => `
                <div class="exp-item">
                    <h4>${d.job_position}</h4>
                    <div class="meta">${d.company} | ${d.duration}</div>
                    <p class="desc">${d.description || ''}</p>
                </div>
            `);

            // Template Cert Item
            fetchData('cert', 'cert-list', d => `
                <div class="exp-item">
                    <h4>${d.name}</h4>
                    <div class="meta">${d.publisher}</div>
                </div>
            `);

            // Template Volunteer Item
            fetchData('volunteer', 'volunteer-list', d => `
                <div class="exp-item">
                    <h4>${d.role}</h4>
                    <div class="meta">${d.organization} | ${d.duration}</div>
                    <p class="desc">${d.description || ''}</p>
                </div>
            `);
        }
        window.onload = init;
    </script>
</body>
</html>
