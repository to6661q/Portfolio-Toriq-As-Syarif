<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toriq As Syarif | Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="container nav-container">
            <h1 class="logo">TAS<span>.</span></h1>
            <nav>
                <ul class="nav-menu">
                    <li><a href="#profile">Home</a></li>
                    <li><a href="#project">Project</a></li>
                    <li><a href="#work">Work</a></li>
                    <li><a href="#certification">Certs</a></li>
                    <li><a href="#volunteer">Volunteer</a></li>
                    <li><a href="login.html"><i class="fas fa-lock"></i></a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section id="profile" class="hero">
        <div class="container hero-flex">
            <div class="hero-text">
                <h1>Halo, Saya <span class="highlight">Toriq As Syarif</span></h1>
                <p id="display-headline" class="subtitle">IT Specialist</p>
                <p id="display-about" class="about-p">Loading...</p>
            </div>
        </div>
    </section>

    <section id="project" class="section bg-light">
        <div class="container">
            <h2 class="section-title">My Project</h2>
            <div id="project-list" class="project-grid"></div>
        </div>
    </section>

    <section class="section">
        <div class="container">
            <h2 class="section-title">Experience & Achievements</h2>
            <div class="timeline-grid">
                <div>
                    <h3>Work Experience</h3>
                    <div id="work-list"></div>
                </div>
                <div>
                    <h3>Certifications</h3>
                    <div id="certification-list"></div>
                </div>
                <div>
                    <h3>Volunteer</h3>
                    <div id="volunteer-list"></div>
                </div>
            </div>
        </div>
    </section>

    <script type="module">
        import { supabase } from './js/supabase-config.js';

        async function loadData() {
            // 1. Profile
            const { data: prof } = await supabase.from('profiles').select('*').eq('id', 1).single();
            if (prof) {
                document.getElementById('display-headline').innerText = prof.headline;
                document.getElementById('display-about').innerText = prof.about_text;
            }

            // 2. Projects
            const { data: projs } = await supabase.from('projects').select('*').order('id', { ascending: false });
            if (projs) {
                document.getElementById('project-list').innerHTML = projs.map(p => `
                    <div class="project-card">
                        <img src="${p.image_url || 'img/default-proj.jpg'}" onerror="this.src='img/default-proj.jpg'">
                        <div class="p-content">
                            <h3>${p.title}</h3>
                            <p>${p.description || ''}</p>
                            <a href="${p.link_github}" target="_blank" class="btn-primary">GitHub</a>
                        </div>
                    </div>`).join('');
            }

            // 3. Timelines (Work, Certs, Vol)
            const configs = [
                { table: 'work_experience', el: 'work-list', t: 'job_position', s: 'company' },
                { table: 'certifications', el: 'certification-list', t: 'name', s: 'publisher' },
                { table: 'volunteers', el: 'volunteer-list', t: 'role', s: 'organization' }
            ];

            for (const conf of configs) {
                const { data } = await supabase.from(conf.table).select('*').order('id', { ascending: false });
                const container = document.getElementById(conf.el);
                if (data && container) {
                    container.innerHTML = data.map(d => `
                        <div class="exp-item" style="border-left: 2px solid #006661; padding-left: 10px; margin-bottom: 15px;">
                            <h4 style="color:#006661; margin:0;">${d[conf.t]}</h4>
                            <small>${d[conf.s]} | ${d.duration || ''}</small>
                            <p style="margin-top:5px; font-size:0.9rem;">${d.description || ''}</p>
                        </div>`).join('');
                }
            }
        }
        window.onload = loadData;
    </script>
</body>
</html>
