<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Portofolio</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="container nav-flex">
            <h2 style="color:var(--primary); margin:0;">TAS.</h2>
            <nav class="nav-links">
                <a href="#project">Projects</a>
                <a href="#work">Work</a>
                <a href="#cert">Certs</a>
                <a href="#volunteer">Volunteer</a>
            </nav>
        </div>
    </header>

    <section id="profile" class="section">
        <div class="container" style="text-align:center;">
            <h1 id="display-headline" style="font-size:3rem; margin-bottom:10px;">Loading...</h1>
            <p id="display-about" style="max-width:700px; margin: 0 auto; line-height:1.6;"></p>
        </div>
    </section>

    <section id="project" class="section bg-light">
        <div class="container">
            <h2 class="section-title">Projects</h2>
            <div id="project-list" class="grid"></div>
        </div>
    </section>

    <section class="section">
        <div class="container">
            <h2 class="section-title">Experience & Activities</h2>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:40px;">
                <div>
                    <h3>Work Experience</h3>
                    <div id="work-list"></div>
                </div>
                <div>
                    <h3>Certifications & Volunteer</h3>
                    <div id="cert-list"></div>
                    <div id="volunteer-list" style="margin-top:40px;"></div>
                </div>
            </div>
        </div>
    </section>

    <script type="module">
        import { supabase } from './js/supabase-config.js';

        async function init() {
            const { data: p } = await supabase.from('profile').select('*').eq('id', 1).single();
            if (p) {
                document.getElementById('display-headline').innerText = p.headline;
                document.getElementById('display-about').innerText = p.about_text;
            }

            const load = async (table, elId, htmlFn) => {
                const { data } = await supabase.from(table).select('*').order('id', { ascending: false });
                if (data) document.getElementById(elId).innerHTML = data.map(htmlFn).join('');
            };

            load('project', 'project-list', d => `
                <div class="card">
                    <h3>${d.title}</h3>
                    <p>${d.description}</p>
                    <a href="${d.link_github}" target="_blank" style="color:var(--primary); font-weight:bold;">View Github</a>
                </div>`);

            load('work', 'work-list', d => `
                <div class="exp-item">
                    <h4>${d.job_position}</h4>
                    <p><b>${d.company}</b> | ${d.duration}</p>
                    <p>${d.description}</p>
                </div>`);

            load('cert', 'cert-list', d => `
                <div class="exp-item">
                    <h4>${d.name}</h4>
                    <p>${d.publisher}</p>
                </div>`);

            load('volunteer', 'volunteer-list', d => `
                <div class="exp-item">
                    <h4>${d.role}</h4>
                    <p><b>${d.organization}</b> | ${d.duration}</p>
                </div>`);
        }
        window.onload = init;
    </script>
</body>
</html>
