<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #006661;
            --dark: #004d49;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f4f4;
            height: 100vh;
            display: flex; /* Membuat box di tengah */
            align-items: center;
            justify-content: center;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 380px;
            text-align: center;
        }
        .login-box h2 { color: var(--primary); margin-bottom: 8px; }
        .login-box p { color: #636e72; margin-bottom: 25px; font-size: 14px; }
        .form-group { text-align: left; margin-bottom: 18px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: var(--dark); font-size: 13px; }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        input:focus { outline: none; border-color: var(--primary); }
        button {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background: var(--dark); }
        #message { color: #e74c3c; font-size: 13px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Admin Access</h2>
        <p>Silakan masuk untuk mengelola portofolio.</p>
        <form id="login-form">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" required placeholder="toriq@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <button type="submit" id="login-btn">Sign In</button>
        </form>
        <div id="message"></div>
    </div>
    <script type="module" src="js/auth.js"></script>
</body>
</html>
