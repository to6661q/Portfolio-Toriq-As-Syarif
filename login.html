<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin | Portofolio</title>
    <link rel="stylesheet" href="css/admin.css"> <!-- Pakai CSS admin agar senada -->
</head>
<body>
    <div class="login-wrapper">
        <div class="login-box">
            <h2>Admin Access</h2>
            <p>Silakan masuk untuk mengelola portofolio.</p>
            
            <form id="login-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" required placeholder="email@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" id="login-btn">Sign In</button>
            </form>
            <div id="message" class="error-msg"></div>
        </div>
    </div>

    <script type="module" src="js/auth.js"></script>
</body>
</html>
